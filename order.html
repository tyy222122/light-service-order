<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上點燈 - 線上祈福點燈服務</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-overlay"></div>

    <nav class="top-nav">
        <ul>
            <li><a href="index.html">介紹首頁</a></li>
            <li><a href="promotion.html">清明方案</a></li>
            <li><a href="order.html" class="active">立即點燈</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>線上淨化點燈平台</h1>
            <p>傳遞祝福，淨化身心</p>
        </header>

        <form id="orderForm">
            <div class="form-group">
                <label for="name">申請人姓名</label>
                <input type="text" id="name" name="name" required placeholder="請輸入本名">
            </div>

            <div class="form-group">
                <label for="phone">聯絡電話 (非必填)</label>
                <input type="tel" id="phone" name="phone" placeholder="09XX-XXXXXX">
            </div>

            <div class="form-group">
                <label for="email">電子信箱 (非必填)</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com">
            </div>

            <div class="form-group line-group">
                <div class="half">
                    <label for="calendarType">生日類型</label>
                    <select id="calendarType" name="calendarType">
                        <option value="國曆">國曆</option>
                        <option value="農曆">農曆</option>
                    </select>
                </div>
                <div class="half">
                    <label for="birthday">出生年月日</label>
                    <input type="date" id="birthday" name="birthday" required>
                </div>
            </div>

            <div class="form-group">
                <label for="address">聯絡地址 (非必填)</label>
                <input type="text" id="address" name="address" placeholder="請填寫完整地址">
            </div>

            <div class="form-group">
                <label>祝福燈種 (可多選)</label>
                <div class="checkbox-group">
                    <label class="custom-checkbox">
                        <input type="checkbox" name="lightType" value="清明方案">
                        <span class="checkmark"></span>
                        <span class="light-text">清明祈福方案 (超薦祖先、家運興旺)</span>
                        <span class="price-tag">3天 NT$ 888</span>
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" name="lightType" value="淨化守護燈">
                        <span class="checkmark"></span>
                        <span class="light-text">淨化守護燈 (淨化磁場、趨吉避凶)</span>
                        <span class="price-tag">30天 NT$ 11,000</span>
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" name="lightType" value="人際和諧燈">
                        <span class="checkmark"></span>
                        <span class="light-text">人際和諧燈 (增進人緣、關係圓滿)</span>
                        <span class="price-tag">30天 NT$ 12,000</span>
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" name="lightType" value="祝福地基主">
                        <span class="checkmark"></span>
                        <span class="light-text">祝福地基主 (守護家宅、闔家平安)</span>
                        <span class="price-tag">30天 $ 12,500</span>
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" name="lightType" value="客製化點燈">
                        <span class="checkmark"></span>
                        <span class="light-text">客製化點燈 (請在備註填寫需求)</span>
                        <span class="price-tag">專人報價</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="remarks">祝福心願 (備註)</label>
                <textarea id="remarks" name="remarks" rows="3" placeholder="請寫下您的心願..."></textarea>
            </div>

            <button type="submit" id="submitBtn">
                <span class="btn-text">確認點燈</span>
                <span class="loader" style="display: none;"></span>
            </button>
        </form>

        <div id="successMessage" class="hidden">
            <div class="success-icon">✨</div>
            <h2>申辦成功</h2>
            <p>您的點燈申請資料已成功送出！</p>
            <button onclick="location.reload()">再次填寫</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
