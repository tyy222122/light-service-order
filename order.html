<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上點燈 - 線上祈福點燈服務</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-overlay"></div>

    <nav class="top-nav">
        <ul>
            <li><a href="index.html">介紹首頁</a></li>
            <li><a href="promotion.html">清明方案</a></li>
            <li><a href="order.html" class="active">立即點燈</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>線上淨化點燈平台</h1>
            <p>傳遞祝福，淨化身心</p>
        </header>

        <form id="orderForm">
            <div class="form-group">
                <label for="phone">聯絡電話 (主要聯絡人)</label>
                <input type="tel" id="phone" name="phone" required placeholder="09XX-XXXXXX">
            </div>

            <div class="form-group">
                <label>祝福燈種 (可多選)</label>
                <div class="checkbox-group">

                    <!-- 第 1 項：清明方案 -->
                    <div class="light-option">
                        <label class="custom-checkbox">
                            <input type="checkbox" name="lightType" value="清明方案">
                            <span class="checkmark"></span>
                            <span class="light-text">清明祈福方案 (超薦祖先、家運興旺)</span>
                            <span class="price-tag">3天 NT$ 888</span>
                        </label>
                        <div class="sub-form hidden">
                            <div class="form-group">
                                <label>申請人姓名</label>
                                <input type="text" name="name_清明方案" placeholder="請輸入本名">
                            </div>
                            <div class="form-group line-group">
                                <div class="half">
                                    <label>生日類型</label>
                                    <select name="calendarType_清明方案" class="calendar-select">
                                        <option value="國曆">國曆</option>
                                        <option value="農曆">農曆</option>
                                    </select>
                                </div>
                                <div class="half">
                                    <label>出生年月日</label>
                                    <input type="date" name="birthday_清明方案" class="birthday-input">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>聯絡地址</label>
                                <input type="text" name="address_清明方案" placeholder="請填寫完整地址">
                            </div>
                            <div class="form-group">
                                <label>祝福心願 (備註)</label>
                                <textarea name="remarks_清明方案" rows="2" placeholder="請寫下您的心願..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 第 2 項：淨化守護燈 -->
                    <div class="light-option">
                        <label class="custom-checkbox">
                            <input type="checkbox" name="lightType" value="淨化守護燈">
                            <span class="checkmark"></span>
                            <span class="light-text">淨化守護燈 (淨化磁場、趨吉避凶)</span>
                            <span class="price-tag">30天 NT$ 11,000</span>
                        </label>
                        <div class="sub-form hidden">
                            <div class="form-group">
                                <label>申請人姓名</label>
                                <input type="text" name="name_淨化守護燈" placeholder="請輸入本名">
                            </div>
                            <div class="form-group line-group">
                                <div class="half">
                                    <label>生日類型</label>
                                    <select name="calendarType_淨化守護燈" class="calendar-select">
                                        <option value="國曆">國曆</option>
                                        <option value="農曆">農曆</option>
                                    </select>
                                </div>
                                <div class="half">
                                    <label>出生年月日</label>
                                    <input type="date" name="birthday_淨化守護燈" class="birthday-input">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>聯絡地址</label>
                                <input type="text" name="address_淨化守護燈" placeholder="請填寫完整地址">
                            </div>
                            <div class="form-group">
                                <label>祝福心願 (備註)</label>
                                <textarea name="remarks_淨化守護燈" rows="2" placeholder="請寫下您的心願..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 第 3 項：人際和諧燈 -->
                    <div class="light-option">
                        <label class="custom-checkbox">
                            <input type="checkbox" name="lightType" value="人際和諧燈">
                            <span class="checkmark"></span>
                            <span class="light-text">人際和諧燈 (增進人緣、關係圓滿)</span>
                            <span class="price-tag">30天 NT$ 12,000</span>
                        </label>
                        <div class="sub-form hidden">
                            <div class="form-group">
                                <label>申請人姓名</label>
                                <input type="text" name="name_人際和諧燈" placeholder="請輸入本名">
                            </div>
                            <div class="form-group line-group">
                                <div class="half">
                                    <label>生日類型</label>
                                    <select name="calendarType_人際和諧燈" class="calendar-select">
                                        <option value="國曆">國曆</option>
                                        <option value="農曆">農曆</option>
                                    </select>
                                </div>
                                <div class="half">
                                    <label>出生年月日</label>
                                    <input type="date" name="birthday_人際和諧燈" class="birthday-input">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>聯絡地址</label>
                                <input type="text" name="address_人際和諧燈" placeholder="請填寫完整地址">
                            </div>
                            <div class="form-group">
                                <label>祝福心願 (備註)</label>
                                <textarea name="remarks_人際和諧燈" rows="2" placeholder="請寫下您的心願..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 第 4 項：祝福地基主 -->
                    <div class="light-option">
                        <label class="custom-checkbox">
                            <input type="checkbox" name="lightType" value="祝福地基主">
                            <span class="checkmark"></span>
                            <span class="light-text">祝福地基主 (守護家宅、闔家平安)</span>
                            <span class="price-tag">30天 $ 12,500</span>
                        </label>
                        <div class="sub-form hidden">
                            <div class="form-group">
                                <label>申請人姓名</label>
                                <input type="text" name="name_祝福地基主" placeholder="請輸入本名">
                            </div>
                            <div class="form-group line-group">
                                <div class="half">
                                    <label>生日類型</label>
                                    <select name="calendarType_祝福地基主" class="calendar-select">
                                        <option value="國曆">國曆</option>
                                        <option value="農曆">農曆</option>
                                    </select>
                                </div>
                                <div class="half">
                                    <label>出生年月日</label>
                                    <input type="date" name="birthday_祝福地基主" class="birthday-input">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>聯絡地址</label>
                                <input type="text" name="address_祝福地基主" placeholder="請填寫完整地址">
                            </div>
                            <div class="form-group">
                                <label>祝福心願 (備註)</label>
                                <textarea name="remarks_祝福地基主" rows="2" placeholder="請寫下您的心願..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 第 5 項：客製化點燈 -->
                    <div class="light-option">
                        <label class="custom-checkbox">
                            <input type="checkbox" name="lightType" value="客製化點燈">
                            <span class="checkmark"></span>
                            <span class="light-text">客製化點燈 (請在備註填寫需求)</span>
                            <span class="price-tag">專人報價</span>
                        </label>
                        <div class="sub-form hidden">
                            <div class="form-group">
                                <label>申請人姓名</label>
                                <input type="text" name="name_客製化點燈" placeholder="請輸入本名">
                            </div>
                            <div class="form-group line-group">
                                <div class="half">
                                    <label>生日類型</label>
                                    <select name="calendarType_客製化點燈" class="calendar-select">
                                        <option value="國曆">國曆</option>
                                        <option value="農曆">農曆</option>
                                    </select>
                                </div>
                                <div class="half">
                                    <label>出生年月日</label>
                                    <input type="date" name="birthday_客製化點燈" class="birthday-input">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>聯絡地址</label>
                                <input type="text" name="address_客製化點燈" placeholder="請填寫完整地址">
                            </div>
                            <div class="form-group">
                                <label>祝福心願 (備註)</label>
                                <textarea name="remarks_客製化點燈" rows="2" placeholder="請寫下您的心願..."></textarea>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <button type="submit" id="submitBtn">
                <span class="btn-text">確認點燈</span>
                <span class="loader" style="display: none;"></span>
            </button>
        </form>

        <div id="successMessage" class="hidden">
            <div class="success-icon">✨</div>
            <h2>申辦成功</h2>
            <p>您的點燈申請資料已成功送出！</p>

            <div class="line-contact">
                <h3>下一步：請加入客服琪霏 LINE</h3>
                <h3>LINE ID：0931154594</h3>
                <img src="images/line-qr-code.jpg" alt="客服 LINE QR Code" class="qr-code">
            </div>

            <div class="payment-info">
                <h3>匯款資訊</h3>
                <p><strong>銀行：</strong> 台北富邦銀行 (012) 中壢分行</p>
                <p><strong>戶名：</strong> 林琝蓁</p>
                <p><strong>帳號：</strong> 713168004881</p>
                <p>完成匯款後，請務必回傳您的<strong>【匯款帳號末五碼】</strong></p>
                <p>若有任何問題也歡迎詢問！</p>
            </div>


            <button onclick="location.reload()">再次填寫</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
